<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Debug - AI Transformation</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
        .container { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
        .box { border: 1px solid #00ff41; padding: 1rem; text-align: center; }
        video, canvas, img { max-width: 300px; border: 1px solid #00ff41; background: #111; }
        button { background: #00ff41; color: #000; border: none; padding: 1rem 2rem; cursor: pointer; font-family: inherit; font-weight: bold; margin: 1rem; }
        #log { width: 80%; background: #111; padding: 1rem; margin-top: 2rem; border: 1px solid #333; height: 200px; overflow-y: scroll; white-space: pre-wrap; font-size: 0.8rem; }
    </style>
</head>
<body>
    <h1>Matrix Neural Lab - AI Debug</h1>
    
    <div class="container">
        <div class="box">
            <h3>Webcam View</h3>
            <video id="v" autoplay playsinline></video>
        </div>
        <div class="box">
            <h3>Captured (Original)</h3>
            <canvas id="c"></canvas>
        </div>
        <div class="box">
            <h3>AI Transformed</h3>
            <div id="result-container"></div>
        </div>
    </div>

    <div>
        <button id="cap">1. CAPTURAR E TRANSFORMAR</button>
    </div>

    <div id="log">Aguardando operação...</div>

    <script type="module" src="/src/debug.ts"></script>
</body>
</html>
